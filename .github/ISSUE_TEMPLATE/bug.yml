name: Bug Report
description: Report a defect or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "## Bug Report"
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: Browser, OS, screen size
      placeholder: "Chrome 125, macOS 15, 1440px"
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / recordings
